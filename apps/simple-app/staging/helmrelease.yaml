apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: simple-app
  namespace: staging
spec:
  interval: 5m
  chart:
    spec:
      chart: ./charts/simple-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      interval: 1m
  values:
    replicaCount: 1
    image:
      repository: vitaliidenysiuk97/simple-app-final
      tag: v0.0.4
      pullPolicy: IfNotPresent
    ingress:
      enabled: true
      className: nginx
      host: app.staging.local
      path: /
    resources: {}
    autoscaling:
      enabled: false
    env:
      DATABASE_URL: "postgresql://app:app@postgres-rw.staging.svc.cluster.local:5432/app?sslmode=disable"
      APP_STORE: "redis"
      APP_REDIS_URL: "redis://dragonfly.staging.svc.cluster.local:6379/0"