replicaCount: 1

image:
  repository: vitaliidenysiuk97/simple-app-final
  tag: v0.0.1
  pullPolicy: IfNotPresent

ingress:
  enabled: true
  className: nginx
  host: app.staging.local
  path: /

resources: {}

autoscaling:
  enabled: false

env:
  DATABASE_URL: "postgresql://app:app@postgres-rw.staging.svc.cluster.local:5432/app?sslmode=disable"
  APP_STORE: "redis"
  APP_REDIS_URL: "redis://dragonfly.staging.svc.cluster.local:6379/0"