apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: simple-app
  namespace: production
spec:
  interval: 5m
  chart:
    spec:
      chart: ./charts/simple-app
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      interval: 1m
  values:
    replicaCount: 2
    image:
      repository: vitaliidenysiuk97/simple-app-final
      tag: v0.0.2
      pullPolicy: IfNotPresent
    ingress:
      enabled: true
      className: nginx
      host: app.local
      path: /
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 5
      targetCPUUtilizationPercentage: 70
    env:
      DATABASE_URL: "postgresql://app:app@postgres-rw.production.svc.cluster.local:5432/app?sslmode=disable"
      APP_STORE: "redis"
      APP_REDIS_URL: "redis://dragonfly.production.svc.cluster.local:6379/0"